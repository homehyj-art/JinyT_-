<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세특 자동 생성기 (공유용)</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: sans-serif; padding:20px; max-width:900px; margin:auto; }
textarea { width:100%; height:150px; margin-top:10px; }
button { margin-top:10px; padding:10px; }
</style>
</head>
<body>

<h2>📘 세특 자동 생성기 (교사용 공유 버전)</h2>

<textarea id="input" placeholder="학생 활동 입력"></textarea>

<button onclick="generate()">세특 생성 (3버전)</button>

<h3>결과</h3>
<div id="tabs"></div>
<textarea id="output"></textarea>

<hr>

<h3>📊 엑셀 일괄 생성</h3>
<input type="file" id="excel" accept=".xlsx"/>
<button onclick="handleExcel()">엑셀 생성</button>

<div style="color:red; margin-top:20px;">
※ 개인정보 입력 금지 (이름, 학교명 등)<br>
※ 입력 데이터는 외부 AI 서버로 전송됩니다
</div>

<script>
let versions = [];
let active = 0;
let bank = JSON.parse(localStorage.getItem("bank") || "[]");

/* 🔐 개인정보 제거 */
function anonymize(t){
  return t.replace(/[가-힣]{3}/g,"학생");
}

/* ❌ 금지어 제거 */
function filterText(t){
  ["수상","대회","논문","특허"].forEach(w=>{
    t=t.replaceAll(w,"");
  });
  return t;
}

/* 🔁 중복 검사 */
function isDuplicate(text){
  return bank.some(prev=>{
    return text.includes(prev.substring(0,30));
  });
}

/* 🤖 GPT급 API */
async function ai(prompt){
  const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
    method:"POST",
    headers:{
      "Authorization":"Bearer YOUR_API_KEY",
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"mistralai/mistral-7b-instruct",
      messages:[
        {role:"system",content:"고등학교 세특 작성 교사"},
        {role:"user",content:prompt}
      ]
    })
  });
  const data = await res.json();
  return data.choices[0].message.content;
}

/* 📘 프롬프트 */
function buildPrompt(t){
  return t + `
- '함' 체로 작성
- 과정 중심
- 구체 내용 포함
- 활동 나열 금지
`;
}

/* 🔥 생성 */
async function generate(){
  let t = document.getElementById("input").value;

  t = anonymize(t);
  t = filterText(t);

  versions = [];

  for(let i=0;i<3;i++){
    let r = await ai(buildPrompt(t + " 다른 표현"));
    if(isDuplicate(r)){
      r = await ai(buildPrompt(t+" 완전히 다르게"));
    }
    versions.push(r);
  }

  bank.push(versions[0]);
  localStorage.setItem("bank",JSON.stringify(bank));

  render();
}

/* 출력 */
function render(){
  document.getElementById("output").value = versions[active];

  let tabs = document.getElementById("tabs");
  tabs.innerHTML="";

  versions.forEach((v,i)=>{
    let btn=document.createElement("button");
    btn.innerText="버전"+(i+1);
    btn.onclick=()=>{ active=i; render(); };
    tabs.appendChild(btn);
  });
}

/* 📊 엑셀 처리 */
async function handleExcel(){
  const file = document.getElementById("excel").files[0];
  const reader = new FileReader();

  reader.onload = async (e)=>{
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data,{type:"array"});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);

    let out=[];

    for (const row of rows){
      let t = anonymize(row["활동"]||"");
      t = filterText(t);

      const result = await ai(buildPrompt(t));

      out.push({
        이름: row["이름"]||"",
        세특: result
      });
    }

    const ws = XLSX.utils.json_to_sheet(out);
    const newWb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(newWb,ws,"결과");
    XLSX.writeFile(newWb,"세특결과.xlsx");
  };

  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
