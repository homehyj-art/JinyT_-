<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세특 자동 생성기 (교사용 공유판)</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family:sans-serif;
  max-width:1000px;
  margin:auto;
  padding:20px;
}
textarea{
  width:100%;
  height:150px;
  margin-top:10px;
}
button{
  margin-top:10px;
  padding:10px 15px;
  margin-right:5px;
}
.tabs button{
  margin-right:5px;
}
</style>
</head>

<body>

<h2>📘 세특 자동 생성기 (교사용 공유 버전)</h2>

<textarea id="input" placeholder="학생 활동 내용 입력"></textarea>
<button onclick="generate()">세특 3버전 생성</button>

<div class="tabs" id="tabs"></div>
<textarea id="output"></textarea>

<hr>

<h3>📊 엑셀 일괄 생성</h3>
<input type="file" id="excel" accept=".xlsx">
<button onclick="handleExcel()">엑셀 생성</button>

<div style="color:red;margin-top:20px;">
※ 학생 이름, 학교명 등 개인정보 입력 금지<br>
※ 입력 내용은 외부 AI 서버로 전송됩니다
</div>

<script>
let versions=[];
let active=0;
let bank=JSON.parse(localStorage.getItem("seteuk-bank")||"[]");

/* 🔐 개인정보 제거 */
function anonymize(text){
  return text
    .replace(/[가-힣]{2,4}(고|중|초)등학교/g,"소속학교")
    .replace(/[가-힣]{2,3}(학생|씨)/g,"학생")
    .replace(/[가-힣]{2,3}/g,(m)=> m.length===3 ? "학생" : m);
}

/* ❌ 금지어 제거 */
const banned=["수상","대회","논문","특허","토익","자격증"];
function filterText(text){
  banned.forEach(w=>{
    text=text.replaceAll(w,"");
  });
  return text;
}

/* 🔁 6어절 중복 검사 */
function isDuplicate(newText){
  return bank.some(prev=>{
    let words=newText.split(" ");
    for(let i=0;i<words.length-6;i++){
      let chunk=words.slice(i,i+6).join(" ");
      if(prev.includes(chunk)) return true;
    }
    return false;
  });
}

/* 🤖 GPT급 API (OpenRouter) */
async function ai(prompt){
  const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
    method:"POST",
    headers:{
      "Authorization":"Bearer YOUR_API_KEY",
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"mistralai/mistral-7b-instruct",
      messages:[
        {role:"system",content:"고등학교 세특 전문 교사"},
        {role:"user",content:prompt}
      ],
      temperature:0.7
    })
  });

  const data=await res.json();
  return data.choices?.[0]?.message?.content || "생성 실패";
}

/* 📘 품질 강화 프롬프트 */
function buildPrompt(text){
  return text+`
다음 조건을 반드시 지켜 작성:
- '~함', '~임'으로 문장 종결
- 활동 나열이 아닌 탐구 과정 중심
- 구체적 근거 포함
- 학생 개별성 드러낼 것
- 1500바이트 이내
`;
}

/* 🔥 3버전 생성 */
async function generate(){
  let input=document.getElementById("input").value;

  input=anonymize(input);
  input=filterText(input);

  versions=[];

  for(let i=0;i<3;i++){
    let result="";
    let attempt=0;

    while(attempt<3){
      result=await ai(buildPrompt(input+" 다른 표현"+i));

      if(result.length<200){ attempt++; continue; }

      if(!isDuplicate(result)) break;

      attempt++;
    }

    versions.push(result);
  }

  bank.push(versions[0]);
  localStorage.setItem("seteuk-bank",JSON.stringify(bank));

  active=0;
  render();
}

/* 출력 */
function render(){
  document.getElementById("output").value=versions[active];

  let tabs=document.getElementById("tabs");
  tabs.innerHTML="";

  versions.forEach((v,i)=>{
    let btn=document.createElement("button");
    btn.innerText="버전 "+(i+1);
    btn.onclick=()=>{
      active=i;
      render();
    };
    tabs.appendChild(btn);
  });
}

/* 📊 엑셀 처리 */
async function handleExcel(){
  const file=document.getElementById("excel").files[0];
  const reader=new FileReader();

  reader.onload=async(e)=>{
    const data=new Uint8Array(e.target.result);
    const wb=XLSX.read(data,{type:"array"});
    const sheet=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(sheet);

    let results=[];

    for(const row of rows){
      let text=anonymize(row["활동내용"]||"");
      text=filterText(text);

      const result=await ai(buildPrompt(text));

      results.push({
        이름:row["이름"]||"",
        세특:result
      });

      await new Promise(r=>setTimeout(r,300)); // 과부하 방지
    }

    const ws=XLSX.utils.json_to_sheet(results);
    const newWb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(newWb,ws,"결과");

    XLSX.writeFile(newWb,"세특결과.xlsx");
  };

  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
